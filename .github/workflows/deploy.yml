name: Deploy to GCP VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Google Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Deploy to GCE
      run: |
        gcloud compute ssh instance-20260413-195035 \
          --zone us-west1-c \
          --tunnel-through-iap \
          --command "
            cd ~/repo
            git fetch origin main
            git reset --hard origin/main
            pkill -f 'server.py' || true
            nohup env PYTHONPATH=\$(pwd) CONFERENCE_DATA_PATH=\$(pwd)/data/conference_kaggle.json \
              /home/xiancao/venv/bin/python server.py > app.log 2>&1 &
            sleep 3 && ps aux | grep server.py | grep -v grep
          "
