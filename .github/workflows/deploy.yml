name: Deploy to GCP VM

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GCP_PROJECT_ID: aerial-rarity-484202-j8
      GCP_SERVICE_ACCOUNT: github-deployer@aerial-rarity-484202-j8.iam.gserviceaccount.com
      GCE_INSTANCE: instance-20260413-195035
      GCE_ZONE: us-west1-c
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set auth method flags
      env:
        SECRET_KEY: ${{ secrets.GCP_SA_KEY }}
      run: |
        WIF="${{ vars.WIF_PROVIDER || secrets.WIF_PROVIDER }}"
        echo "WIF_PROVIDER=${WIF}" >> $GITHUB_ENV
        if [ -n "$SECRET_KEY" ]; then
          echo "HAS_SA_KEY=true" >> $GITHUB_ENV
        else
          echo "HAS_SA_KEY=false" >> $GITHUB_ENV
        fi

    - name: Validate GCP Auth Configuration
      run: |
        if [ -n "${WIF_PROVIDER}" ]; then
          case "${WIF_PROVIDER}" in
            projects/*/locations/global/workloadIdentityPools/*/providers/*) ;;
            *)
              echo "::error title=Invalid WIF_PROVIDER::Expected format: projects/NUMBER/locations/global/workloadIdentityPools/POOL/providers/PROVIDER"
              exit 1
              ;;
          esac
        elif [ "${HAS_SA_KEY}" = "true" ]; then
          echo "Service account key secret found, proceeding with SA key auth."
        else
          echo "::error title=Missing credentials::Set GCP_SA_KEY (Actions secret) or WIF_PROVIDER (Actions variable)."
          exit 1
        fi

    - name: Google Auth via WIF
      if: env.WIF_PROVIDER != ''
      id: auth-wif
      uses: google-github-actions/auth@v3
      with:
        workload_identity_provider: ${{ env.WIF_PROVIDER }}
        service_account: ${{ env.GCP_SERVICE_ACCOUNT }}
        project_id: ${{ env.GCP_PROJECT_ID }}

    - name: Google Auth via Service Account Key
      if: env.WIF_PROVIDER == '' && env.HAS_SA_KEY == 'true'
      id: auth-key
      uses: google-github-actions/auth@v3
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ env.GCP_PROJECT_ID }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v3
      with:
        project_id: ${{ env.GCP_PROJECT_ID }}
        version: '>= 363.0.0'

    - name: Deploy to GCE
      run: |
        gcloud compute ssh "${GCE_INSTANCE}" \
          --zone "${GCE_ZONE}" \
          --tunnel-through-iap \
          --command "
            set -e
            APP_DIR=\$HOME/repo
            if [ ! -d \"\${APP_DIR}/.git\" ]; then
              APP_DIR=\$HOME/Conference-Matching-Platform
            fi
            if [ ! -d \"\${APP_DIR}/.git\" ]; then
              git clone https://github.com/xiancao2024/Conference-Matching-Platform.git \"\${APP_DIR}\"
            fi
            cd \"\${APP_DIR}\"
            git fetch origin main
            git reset --hard origin/main
            sudo pkill -f 'server.py' || true
            nohup env PYTHONPATH=\$(pwd) CONFERENCE_DATA_PATH=\$(pwd)/data/conference_kaggle.json \
              /home/xiancao/venv/bin/python server.py --host 0.0.0.0 --port 8000 > app.log 2>&1 &
            sleep 3
            if ! ps aux | grep server.py | grep -v grep; then
              echo "Server failed to start. Tailing app.log:"
              cat app.log
              exit 1
            fi
          "
